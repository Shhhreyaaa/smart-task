{% extends "base.html" %}

{% block title %}Server Error (500) - Smart Tasks{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-8 col-lg-6 text-center">
        <i class="bi bi-exclamation-triangle text-danger display-1 mb-4 d-block"></i>
        <h1 class="display-5 fw-bold text-dark mb-3">500</h1>
        <h2 class="h4 fw-semibold text-secondary mb-4">Internal Server Error</h2>
        <p class="text-muted mb-5">
            Something went wrong on our end. Our engineering team has been notified and is working on a fix.
        </p>
        <a href="{{ url_for('core.index') }}" class="btn btn-primary btn-lg px-5 shadow-sm rounded-pill">
            <i class="bi bi-arrow-left me-2"></i>Go Back
        </a>
    </div>
</div>
{% endblock %}
