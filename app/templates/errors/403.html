{% extends "base.html" %}

{% block title %}Access Denied (403) - Smart Tasks{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-8 col-lg-6 text-center">
        <i class="bi bi-shield-lock text-warning display-1 mb-4 d-block"></i>
        <h1 class="display-5 fw-bold text-dark mb-3">403</h1>
        <h2 class="h4 fw-semibold text-secondary mb-4">Access Denied</h2>
        <p class="text-muted mb-5">
            You do not have permission to access this resource. If you believe this is a mistake, please contact support.
        </p>
        <a href="{{ url_for('core.index') }}" class="btn btn-primary btn-lg px-5 shadow-sm rounded-pill">
            <i class="bi bi-house-door me-2"></i>Return Home
        </a>
    </div>
</div>
{% endblock %}
