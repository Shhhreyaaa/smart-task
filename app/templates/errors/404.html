{% extends "base.html" %}

{% block title %}Page Not Found (404) - Smart Tasks{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-8 col-lg-6 text-center">
        <i class="bi bi-file-earmark-x text-muted display-1 mb-4 d-block"></i>
        <h1 class="display-5 fw-bold text-dark mb-3">404</h1>
        <h2 class="h4 fw-semibold text-secondary mb-4">Oops! We couldn't find that page.</h2>
        <p class="text-muted mb-5">
            The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
        </p>
        <a href="{{ url_for('core.index') }}" class="btn btn-primary btn-lg px-5 shadow-sm rounded-pill">
            <i class="bi bi-house-door me-2"></i>Return Home
        </a>
    </div>
</div>
{% endblock %}
